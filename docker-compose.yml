services:
  trino:
    image: trinodb/trino:480
    container_name: trino
    ports:
      - "8080:8080"
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog
      - ${AWS_CONFIG_DIR:-${HOME}/.aws}:/home/trino/.aws:ro
    environment:
      AWS_PROFILE: ${AWS_PROFILE:-nyc-lakehouse}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    restart: unless-stopped

  airflow-postgres:
    image: postgres:16
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5434:5432"
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    container_name: airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment: &airflow-common-env
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AWS_PROFILE: ${AWS_PROFILE:-nyc-lakehouse}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      PROJECT_ROOT: /opt/nyc_taxi_lakehouse
      DBT_PROFILES_DIR: /home/airflow/.dbt
      PYTHONPATH: /opt/nyc_taxi_lakehouse
      S3_BUCKET: ${S3_BUCKET:-nyc-taxi-mpp-lakehouse}
      RAW_PREFIX: ${RAW_PREFIX:-raw/nyc_taxi/yellow_tripdata/}
      REFERENCE_PREFIX: ${REFERENCE_PREFIX:-raw/nyc_taxi/reference/}
      WAREHOUSE_PREFIX: ${WAREHOUSE_PREFIX:-warehouse/}
      TRINO_CATALOG: ${TRINO_CATALOG:-iceberg}
      GLUE_DATABASE_RAW: ${GLUE_DATABASE_RAW:-nyc_lakehouse}
      GLUE_DATABASE_STAGING: ${GLUE_DATABASE_STAGING:-staging}
      GLUE_DATABASE_GOLD: ${GLUE_DATABASE_GOLD:-gold}
      SPARK_CATALOG_NAME: ${SPARK_CATALOG_NAME:-demo}
      RAW_TRIP_MONTHS: ${RAW_TRIP_MONTHS:-2025-01,2025-02}
      DBT_TARGET: ${DBT_TARGET:-dev}
      TRINO_HOST: ${TRINO_HOST:-trino}
      TRINO_PORT: ${TRINO_PORT:-8080}
      TRINO_USER: ${TRINO_USER:-airflow}
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./infra/airflow/logs:/opt/airflow/logs
      - ./infra/airflow/plugins:/opt/airflow/plugins
      - ./:/opt/nyc_taxi_lakehouse
      - ${AWS_CONFIG_DIR:-${HOME}/.aws}:/home/airflow/.aws:ro
      - ./dbt/profiles:/home/airflow/.dbt:ro
    user: "${AIRFLOW_UID:-50000}:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER:-admin} \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com \
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin} || true
    restart: "no"

  airflow-webserver:
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    container_name: airflow-webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./infra/airflow/logs:/opt/airflow/logs
      - ./infra/airflow/plugins:/opt/airflow/plugins
      - ./:/opt/nyc_taxi_lakehouse
      - ${AWS_CONFIG_DIR:-${HOME}/.aws}:/home/airflow/.aws:ro
      - ./dbt/profiles:/home/airflow/.dbt:ro
    user: "${AIRFLOW_UID:-50000}:0"
    ports:
      - "8081:8080"
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    container_name: airflow-scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./infra/airflow/logs:/opt/airflow/logs
      - ./infra/airflow/plugins:/opt/airflow/plugins
      - ./:/opt/nyc_taxi_lakehouse
      - ${AWS_CONFIG_DIR:-${HOME}/.aws}:/home/airflow/.aws:ro
      - ./dbt/profiles:/home/airflow/.dbt:ro
    user: "${AIRFLOW_UID:-50000}:0"
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  airflow_pg_data:
