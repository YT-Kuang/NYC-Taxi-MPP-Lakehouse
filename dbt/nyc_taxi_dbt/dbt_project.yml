name: 'nyc_taxi_dbt'
version: '1.0.0'
config-version: 2

profile: 'nyc_taxi_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  nyc_taxi_dbt:
    staging:
      +materialized: view
      +schema: "{{ env_var('GLUE_DATABASE_STAGING', 'staging') }}"

    marts:
      core:
        +materialized: table
        +schema: "{{ env_var('GLUE_DATABASE_GOLD', 'gold') }}"
      agg:
        +materialized: table
        +schema: "{{ env_var('GLUE_DATABASE_GOLD', 'gold') }}"
