version: 2

models:
  - name: mart_daily_kpis
    description: "Daily KPI mart for taxi business performance."
    columns:
      - name: pickup_date
        tests:
          - not_null
          - unique

  - name: mart_zone_performance
    description: "Zone-level performance mart based on pickup zone."
    columns:
      - name: pickup_borough
        tests:
          - not_null

      - name: pickup_zone
        tests:
          - not_null

  - name: mart_hourly_demand
    description: "Hourly demand mart by date, hour, and pickup borough."
    columns:
      - name: pickup_date
        tests:
          - not_null

      - name: pickup_hour
        tests:
          - not_null

  - name: mart_payment_mix
    description: "Payment type mix mart by date."
    columns:
      - name: pickup_date
        tests:
          - not_null

      - name: payment_type
        tests:
          - not_null